#production-industry way

spring.application.name=techblog

# ================= DATABASE =================

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ================= JPA =================

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# ================= FILE UPLOAD =================

spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# UPLOAD DIRECTORY
file.upload-dir=${UPLOAD_DIR:/app/uploads}

# STATIC FILE ACCESS
spring.web.resources.static-locations=file:${file.upload-dir}/

# ================= EMAIL =================

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ================= JWT =================

jwt.secret=${JWT_SECRET}

server.port=${PORT:8080}

logging.level.org.springframework.boot.autoconfigure.mail=DEBUG
logging.level.org.springframework.mail=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.tool.schema=DEBUG
debug=true

